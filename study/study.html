<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>study history here</title>
    <link rel="stylesheet" href="study.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js" defer></script>
    <script src="study.js" defer></script>

</head>

<body>

    <button id="btn1">① function + then</button>
    <button id="btn2">② arrow + then</button>
    <button id="btn3">③ function + async</button>
    <button id="btn4">④ arrow + async</button>
    <button id="btn5">⑤ 名前付き関数</button>
    <button id="btn6">⑥ async関数を別定義</button>
    <button id="btn7">⑦ axios</button>
    <button id="btn8">⑧ async + axios</button>
    <button id="btn9">⑨ innerHTML + async + axios</button>
    <button id="btn10">⑩ createElement + async + axios</button>

    <div class="study-row11">
        <label for="todoIdInput"><code>todos/</code></label>
        <input type="text" id="todoIdInput" inputmode="numeric" placeholder="例: 5" autocomplete="off" maxlength="10">
        <button type="button" id="btn11">⑪ 入力 + async + axios</button>
    </div>

    <div class="study-row12">
        <label for="uiStateDemo">⑫ 上の入力・⑪ボタンの状態</label>
        <select id="uiStateDemo">
            <option value="none">なし（どちらも通常）</option>
            <option value="input-readonly">入力だけ readonly</option>
            <option value="input-disabled">入力だけ disabled</option>
            <option value="button-disabled">⑪ボタンだけ disabled</option>
            <option value="both-lock">入力 readonly + ⑪ disabled（通信中イメージ）</option>
        </select>
    </div>

	<hr>

	<div id="result"></div>
</body>

</html>
