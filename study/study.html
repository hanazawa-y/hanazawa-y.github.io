<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>study history here</title>

    <!--
        defer を付ける理由

        通常、head内のscriptは
        HTML読み込み途中で即実行される。

        その時点では body の button がまだ存在しないので、

        document.getElementById('btn1')

        が null になることがある。

        defer を付けると、
        HTMLを最後まで読んでからJS実行される。

        さらに、
        上から順番に実行されるので

        axios
        ↓
        study.js

        の順も保証される。
    -->

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js" defer></script>
    <script src="study.js" defer></script>

</head>

<body>

    <button id="btn1">① function + then</button>
    <button id="btn2">② arrow + then</button>
    <button id="btn3">③ function + async</button>
    <button id="btn4">④ arrow + async</button>
    <button id="btn5">⑤ 名前付き関数</button>
    <button id="btn6">⑥ async関数を別定義</button>
    <button id="btn7">⑦ axios</button>
    <button id="btn8">⑧ async + axios</button>

    <!--
        script を body の最後に置く書き方もよくある。

        理由：
        buttonなどHTML生成後にJS実行できるから。

        つまり defer が無くても安全。

        例：

        <script src="study.js"></script>

        をここ(body最後)に置く。
    -->
	<hr>

	<pre id="result"></pre>
</body>

</html>
